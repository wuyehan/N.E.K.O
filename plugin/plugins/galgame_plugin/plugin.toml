[plugin]
id = "galgame_plugin"
name = "Galgame游玩助手"
description = "让猫娘陪伴你一起玩galgame"
short_description = "Monitor galgame sessions, bridge data, memory-reader fallback, and the plugin UI."
keywords = [
    "galgame",
    "bridge",
    "renpy",
    "visual novel",
    "game state",
    "剧情",
    "台词",
    "选项",
]
version = "1.0.0"
type = "plugin"
entry = "plugin.plugins.galgame_plugin:GalgamePlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.store]
enabled = false

[plugin_runtime]
enabled = true
auto_start = false

[galgame]
bridge_root = ""
active_poll_interval_seconds = 1
idle_poll_interval_seconds = 3
stale_after_seconds = 15
history_events_limit = 500
history_lines_limit = 200
history_choices_limit = 50
dedupe_window_limit = 64
warmup_replay_bytes_limit = 65536
warmup_replay_events_limit = 50
default_mode = "companion"
push_notifications = true
auto_open_ui = true
reader_mode = "auto"

[llm]
llm_call_timeout_seconds = 15
llm_max_in_flight = 2
llm_request_cache_ttl_seconds = 2
llm_scene_summary_cache_ttl_seconds = 10
target_entry_ref = ""
vision_enabled = false
vision_max_image_px = 768
temperature_agent_reply = 0.2
temperature_default = 0.0
max_tokens_agent_reply = 900
max_tokens_default = 1200

[memory_reader]
textractor_path = ""
install_release_api_url = ""
install_target_dir = ""
install_timeout_seconds = 180
auto_detect = true
hook_codes = []
poll_interval_seconds = 1

[memory_reader.engine_hooks]
unity = [
    "/HQ14+3C@GameAssembly.dll#0x33A440",
]
kirikiri = []
renpy = []

[ocr_reader]
enabled = true
backend_selection = "rapidocr"
capture_backend = "dxcam"
tesseract_path = ""
install_manifest_url = ""
install_target_dir = ""
install_timeout_seconds = 60
poll_interval_seconds = 0.5
trigger_mode = "interval"
fast_loop_enabled = true
no_text_takeover_after_seconds = 30
background_scene_change_distance = 32
max_unobserved_advances_before_hold = 3
unobserved_advance_hold_duration_seconds = 0.0
languages = "chi_sim+jpn+eng"
left_inset_ratio = 0.05
right_inset_ratio = 0.05
top_ratio = 0.62
bottom_inset_ratio = 0.08
screen_awareness_full_frame_ocr = true
screen_awareness_multi_region_ocr = true
screen_awareness_visual_rules = true
screen_awareness_latency_mode = "balanced"
screen_awareness_min_interval_seconds = 2.0
screen_awareness_sample_collection_enabled = false
screen_awareness_sample_dir = ""
screen_awareness_model_enabled = false
screen_awareness_model_path = ""
screen_awareness_model_min_confidence = 0.55
screen_templates = []
screen_type_transition_emit = true
known_screen_timeout_seconds = 5.0

[rapidocr]
enabled = true
install_manifest_url = ""
install_target_dir = ""
install_timeout_seconds = 180
engine_type = "onnxruntime"
# Default to the bundled Chinese model for better Chinese VN OCR. Japanese
# games can switch this back to `japan`; discrete GPUs may prefer
# `model_type = "server"` for higher accuracy at higher latency.
lang_type = "ch"
model_type = "mobile"
ocr_version = "PP-OCRv4"
# Auto-detect game text language and switch RapidOCR recognition models when
# the target model is already available. Set false to always use lang_type.
auto_detect_lang = true

[plugin.ui]
enabled = true

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "docs/quickstart.md"
permissions = ["state:read"]

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"
