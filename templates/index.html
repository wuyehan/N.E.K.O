    <!-- 角色甄选 Overlay 容器（visibility:hidden 防止 CSS 加载前 FOUC，由入口脚本在 CSS 就绪后移除） -->

    <!-- 角色甄选入口检测 -->
    <script>
        (function() {
            const completed = localStorage.getItem('neko_character_selection_completed');
            const overlay = document.getElementById('character-selection-overlay');

            if (completed !== 'true') {
                // 动态加载角色甄选样式，加载完成后再显示 overlay（防止 FOUC）
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = '/static/css/character-selection.css';
                link.onload = function() {
                    if (overlay) overlay.style.visibility = '';
                };
                link.onerror = function() {
                    // CSS 加载失败时也显示 overlay，保证流程可用
                    if (overlay) overlay.style.visibility = '';
                };
                document.head.appendChild(link);

                // 加载脚本
                const script = document.createElement('script');
                script.src = '/static/js/character-selection.js';
                function handleCharacterSelectionError(err) {
                    console.error('[CharacterSelection] Initialization error:', err);
                    const failedOverlay = document.getElementById('character-selection-overlay');
                    if (failedOverlay) {
                        failedOverlay.style.display = 'none';
                        failedOverlay.remove();
                    }
                    document.dispatchEvent(new Event('characterSelectionLoadFailed'));
                }
                script.onload = function() {
                    // 确保 DOM 完全加载后再初始化
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', function() {
                            try {
                                const characterSelection = new window.CharacterSelection();
                                characterSelection.start();
                            } catch (err) {
                                handleCharacterSelectionError(err);
                            }
                        });
                    } else {
                        try {
                            const characterSelection = new window.CharacterSelection();
                            characterSelection.start();
                        } catch (err) {
                            handleCharacterSelectionError(err);
                        }
                    }
                };
                script.onerror = function() {
                    handleCharacterSelectionError(new Error('Failed to load script'));
                };
                document.body.appendChild(script);
            } else if (overlay) {
                // 已完成角色甄选，移除 overlay 元素
                overlay.style.display = 'none';
                overlay.remove();
            }
        })();
    </script>
