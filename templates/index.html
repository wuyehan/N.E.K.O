            <button id="muteButton" class="side-btn" disabled data-i18n="voiceControl.rest">⏸️ 休息一下</button>

        <div id="chat-content-wrapper">

                        <path d="M5.5 19.25a6.5 6.5 0 0 1 13 0" />

                </button>

                    data-i18n-title="chat.reactWindowOpen"
                    data-i18n-aria="chat.reactWindowOpen">

                        <path d="M8 17.25v1.5h8v-1.5" />
                        <path d="M3.25 10.25h17.5" />

        </div>
        <div id="text-input-area">

                    <div id="avatar-cropper-box" class="avatar-cropper-crop-box">

                            <div class="avatar-cropper-grid-line v1"></div>
                            <div class="avatar-cropper-grid-line v2"></div>

                        <div class="avatar-cropper-handle tr" data-handle="tr"></div>
                        <div class="avatar-cropper-handle bl" data-handle="bl"></div>

                </div>

                        <button class="avatar-cropper-ctrl-btn" data-crop-action="center" data-i18n-title="chat.avatarCropCenter" title="居中"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="3"/><path d="M8 1v3M8 12v3M1 8h3M12 8h3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></button>

    <script>
        window.pageConfigReady = (async function loadPageConfig() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const lanlanNameFromUrl = urlParams.get('lanlan_name') || '';
                const apiUrl = lanlanNameFromUrl
                    ? `/api/config/page_config?lanlan_name=${encodeURIComponent(lanlanNameFromUrl)}`
                    : '/api/config/page_config';
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data && data.success) {
                    if (!window.lanlan_config || typeof window.lanlan_config !== 'object') {
                        window.lanlan_config = {};
                    }
                    window.lanlan_config.lanlan_name = data.lanlan_name || lanlanNameFromUrl || window.lanlan_config.lanlan_name || '';
                    window.lanlan_config.master_name = data.master_name || '';
                    window.lanlan_config.master_profile_name = data.master_profile_name || '';
                    window.lanlan_config.master_nickname = data.master_nickname || '';
                    window.lanlan_config.master_display_name = data.master_display_name || data.master_nickname || data.master_name || '';
                    window.master_name = data.master_name || '';
                    window.master_profile_name = data.master_profile_name || '';
                    window.master_nickname = data.master_nickname || '';
                    window.master_display_name = data.master_display_name || data.master_nickname || data.master_name || '';
                    return data;
                }
            } catch (error) {
                console.warn('[Init] load page_config failed:', error);
            }

            if (!window.lanlan_config || typeof window.lanlan_config !== 'object') {
                window.lanlan_config = {};
            }
            if (typeof window.lanlan_config.lanlan_name !== 'string' || window.lanlan_config.lanlan_name === '') {
                try { window.lanlan_config.lanlan_name = new URLSearchParams(window.location.search).get('lanlan_name') || ''; } catch(_) { window.lanlan_config.lanlan_name = ''; }
            }
            if (typeof window.lanlan_config.master_name !== 'string') {
                window.lanlan_config.master_name = '';
            }
            if (typeof window.lanlan_config.master_profile_name !== 'string') {
                window.lanlan_config.master_profile_name = '';
            }
            if (typeof window.lanlan_config.master_nickname !== 'string') {
                window.lanlan_config.master_nickname = '';
            }
            if (typeof window.lanlan_config.master_display_name !== 'string') {
                window.lanlan_config.master_display_name = window.lanlan_config.master_nickname || window.lanlan_config.master_name || '';
            }
            if (typeof window.master_name !== 'string') {
                window.master_name = window.lanlan_config.master_name || '';
            }
            if (typeof window.master_profile_name !== 'string') {
                window.master_profile_name = window.lanlan_config.master_profile_name || '';
            }
            if (typeof window.master_nickname !== 'string') {
                window.master_nickname = window.lanlan_config.master_nickname || '';
            }
            if (typeof window.master_display_name !== 'string') {
                window.master_display_name = window.lanlan_config.master_display_name || window.master_nickname || window.master_name || '';
            }
            return null;
        })();
    </script>
