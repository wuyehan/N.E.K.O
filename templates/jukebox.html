<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>N.E.K.O. Jukebox</title>

    <!-- i18n -->
    <script src="/static/i18n-i18next.js"></script>
    <!-- APlayer -->
    <link rel="stylesheet" href="/static/libs/APlayer.min.css">
    <script src="/static/libs/APlayer.min.js"></script>
    <!-- 暗色模式 -->
    <link rel="stylesheet" href="/static/css/dark-mode.css">
    <script src="/static/theme-manager.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #87CEEB;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Electron 独立窗口：Jukebox 覆盖全窗口 */
        .jukebox-wrapper {
            position: fixed !important;
            inset: 0 !important;
            bottom: 0 !important;
            right: 0 !important;
            z-index: 1 !important;
        }
        .jukebox-container {
            width: 100% !important;
            max-height: 100% !important;
            height: 100% !important;
            border-radius: 0 !important;
            box-sizing: border-box !important;
        }

        /* 窗口拖拽 —— Chromium 已知 bug：-webkit-app-region 的命中测试区域
           会被合成器缓存，子元素的 no-drag 挖洞经常失效（拖拽后恢复、
           鼠标晃动后又坏、resize 后又好），根本原因是缓存未正确失效。
           解决方案：不在任何包含交互子元素的容器上设 drag，改用一个
           绝对定位的专属拖拽层（.jukebox-drag-overlay），它与按钮在
           DOM 上是兄弟关系而非父子关系，彻底规避缓存 bug。 */
        .jukebox-drag-overlay {
            -webkit-app-region: drag;
        }
        /* 整个 header 及所有交互区域显式 no-drag，防止 preload 注入污染 */
        .jukebox-header,
        .jukebox-header-left,
        .jukebox-header-buttons,
        .jukebox-content,
        .jukebox-controls-row,
        .jukebox-calibration-section,
        .jukebox-notice {
            -webkit-app-region: no-drag !important;
        }
    </style>
</head>
<body>
    <!-- Jukebox.js 自动构建 UI -->
    <script src="/static/Jukebox.js"></script>
    <script>
        // 从后端获取当前模型类型，供 Jukebox 判断是否需要播放 VMD/VRMA
        async function _fetchModelType() {
            try {
                var res = await fetch('/api/config/page_config');
                if (res.ok) {
                    var cfg = await res.json();
                    window.lanlan_config = window.lanlan_config || {};
                    window.lanlan_config.model_type = cfg.model_type || 'live2d';
                    window.lanlan_config.live3d_sub_type = cfg.live3d_sub_type || '';
                    window.lanlan_config.catgirl_name = cfg.lanlan_name || '';
                }
            } catch (_) { /* ignore */ }
        }

        // 等待 i18n 初始化完成后再打开 Jukebox
        async function _initJukebox() {
            if (!window.Jukebox) return;

            // 获取模型类型
            await _fetchModelType();

            // 独立模式：直接打开，不需要绑定按钮
            window.Jukebox_playSong = window.Jukebox.playSong;
            window.Jukebox_close = function() {
                // 独立窗口关闭 = 隐藏窗口
                if (window.close) window.close();
            };
            window.Jukebox_hide = function() {
                if (window.close) window.close();
            };
            window.Jukebox_updateVolume = window.Jukebox.updateVolume;
            window.Jukebox_logVolumeChange = window.Jukebox.logVolumeChange;
            window.Jukebox_togglePause = window.Jukebox.togglePause;

            window.Jukebox.open();
        }

        // i18n-i18next.js 是同步 IIFE + 异步 init，window.t 可能还未就绪
        // 使用轮询等待 + 超时保护
        var _jbInitDone = false;
        function _tryInitJukebox() {
            if (_jbInitDone) return;
            if (typeof window.t === 'function' && window.i18n && window.i18n.isInitialized !== false) {
                _jbInitDone = true;
                _initJukebox();
            }
        }
        var _jbPoll = setInterval(function() { _tryInitJukebox(); }, 100);
        // 超时保护：3s 后无论如何启动
        setTimeout(function() {
            clearInterval(_jbPoll);
            if (!_jbInitDone) {
                _jbInitDone = true;
                // 确保 fallback t 存在
                if (typeof window.t !== 'function') {
                    window.t = function(key, fallback) { return fallback || key; };
                }
                _initJukebox();
            }
        }, 3000);
    </script>
</body>
</html>
